{% extends "base.html" %}

{% block title %}Create Quote | KAS{% endblock %}

{% block content %}
<section class="form-shell">
    <div class="page-title compact">
        <div>
            <p class="eyebrow">Quote Builder</p>
            <h1>Create Quote</h1>
            <p>Build a professional estimate for your client.</p>
        </div>
    </div>

    <form class="form-card" method="post" action="{{ url_for('create_estimate') }}">
        <div class="form-section">
            <h2>Client Information</h2>
            <label for="client_name">Client Name *</label>
            <input id="client_name" name="client_name" type="text" value="{{ client_name or '' }}" required maxlength="200" autocomplete="name">

            <label for="company_name">Company Name</label>
            <input id="company_name" name="company_name" type="text" value="{{ company_name or '' }}" maxlength="200" autocomplete="organization">

            <div class="form-grid two">
                <div>
                    <label for="phone">Phone</label>
                    <input id="phone" name="phone" type="tel" value="{{ phone or '' }}" maxlength="20">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" value="{{ email or '' }}" maxlength="200">
                </div>
            </div>

            <label for="address">Address</label>
            <input id="address" name="address" type="text" value="{{ address or '' }}" maxlength="300" autocomplete="street-address">

            <div class="form-grid two">
                <div>
                    <label for="city">City</label>
                    <input id="city" name="city" type="text" value="{{ city or '' }}" maxlength="100">
                </div>
                <div>
                    <label for="state">State</label>
                    <input id="state" name="state" type="text" value="{{ state or 'FL' }}" maxlength="50">
                </div>
            </div>

            <label for="zip">ZIP Code</label>
            <input id="zip" name="zip" type="text" value="{{ zip_code or '' }}" maxlength="20">
        </div>

        <div class="form-section">
            <h2>Project Information</h2>
            <label for="service_type">Service Type *</label>
            <select id="service_type" name="service_type" required onchange="updateTemplateItems()">
                <option value="">-- Select Service Type --</option>
                {% for service in service_types %}
                    <option value="{{ service }}" {% if service_type == service %}selected{% endif %}>{{ service }}</option>
                {% endfor %}
            </select>

            <label for="project_description">Project Description</label>
            <textarea id="project_description" name="project_description" rows="4">{{ project_description or '' }}</textarea>

            <label for="notes">Internal Notes</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Private notes (not shown on quote)">{{ notes or '' }}</textarea>
        </div>

        <div class="form-grid two">
            <button class="button button-primary button-full" type="submit">Create Quote</button>
            <a href="{{ url_for('estimates') }}" class="button button-full">Cancel</a>
        </div>
    </form>
</section>

<script>
// Service templates data
const serviceTemplates = {{ service_templates|tojson }};

function updateTemplateItems() {
    // This function can be expanded to auto-populate items when creating new estimates
    const serviceType = document.getElementById('service_type').value;
    if (serviceType && serviceTemplates[serviceType]) {
        // Could auto-populate items in edit form
        console.log('Templates available for:', serviceType);
    }
}
</script>
{% endblock %}
