{% extends "base.html" %}

{% block title %}Create Quote | KAS{% endblock %}

{% block content %}
<section class="form-shell">
    <div class="page-title compact">
        <div>
            <p class="eyebrow">Quote Builder</p>
            <h1>Create Quote</h1>
            <p>Build a professional estimate for your client.</p>
        </div>
    </div>

    <form class="form-card" method="post" action="{{ url_for('create_estimate') }}">
        <div class="form-section">
            <h2>Client Information</h2>
            <label for="client_name">Client Name *</label>
            <input id="client_name" name="client_name" type="text" value="{{ client_name or '' }}" required maxlength="200" autocomplete="name">

            <label for="company_name">Company Name</label>
            <input id="company_name" name="company_name" type="text" value="{{ company_name or '' }}" maxlength="200" autocomplete="organization">

            <div class="form-grid two">
                <div>
                    <label for="phone">Phone</label>
                    <input id="phone" name="phone" type="tel" value="{{ phone or '' }}" maxlength="20">
                </div>
                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" value="{{ email or '' }}" maxlength="200">
                </div>
            </div>

            <label for="address">Address</label>
            <input id="address" name="address" type="text" value="{{ address or '' }}" maxlength="300" autocomplete="street-address">

            <div class="form-grid two">
                <div>
                    <label for="city">City</label>
                    <input id="city" name="city" type="text" value="{{ city or '' }}" maxlength="100">
                </div>
                <div>
                    <label for="state">State</label>
                    <input id="state" name="state" type="text" value="{{ state or 'FL' }}" maxlength="50">
                </div>
            </div>

            <label for="zip">ZIP Code</label>
            <input id="zip" name="zip" type="text" value="{{ zip_code or '' }}" maxlength="20">
        </div>

        <div class="form-section">
            <h2>Project Information</h2>
            <label for="service_type">Service Types *</label>
            <select id="service_type" name="service_type" multiple size="6" required onchange="updateTemplateItems()" data-other-label="Other">
                {% for service in service_types %}
                    <option value="{{ service }}" {% if service in (selected_service_types or []) %}selected{% endif %}>{{ service }}</option>
                {% endfor %}
            </select>
            <p class="help-text">Use Ctrl/Cmd + click to select multiple services.</p>
            <div id="service-chip-preview" class="service-chip-preview" aria-live="polite"></div>

            <div id="other-service-wrapper" {% if 'Other' not in (selected_service_types or []) %}hidden{% endif %}>
                <label for="other_service_details">Enter Custom Service</label>
                <input id="other_service_details" name="other_service_details" type="text" value="{{ other_service_details or '' }}" placeholder="Garage Door Repair, Window Cleaning, Epoxy Flooring">
            </div>

            <label for="project_description">Project Description</label>
            <textarea id="project_description" name="project_description" rows="4">{{ project_description or '' }}</textarea>

            <label for="notes">Internal Notes</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Private notes (not shown on quote)">{{ notes or '' }}</textarea>
        </div>

        <div class="form-grid two">
            <button class="button button-primary button-full" type="submit">Create Quote</button>
            <a href="{{ url_for('estimates') }}" class="button button-full">Cancel</a>
        </div>
    </form>
</section>

<script>
// Service templates data
const serviceTemplates = {{ service_templates|tojson }};

function updateTemplateItems() {
    const serviceTypeEl = document.getElementById('service_type');
    const chipPreviewEl = document.getElementById('service-chip-preview');
    const otherWrapper = document.getElementById('other-service-wrapper');
    const otherInput = document.getElementById('other_service_details');
    const selected = Array.from(serviceTypeEl.selectedOptions).map((option) => option.value);

    chipPreviewEl.innerHTML = '';
    selected.forEach((service) => {
        const chip = document.createElement('span');
        chip.className = 'service-chip';
        chip.textContent = service;
        chipPreviewEl.appendChild(chip);
    });

    const otherSelected = selected.includes(serviceTypeEl.dataset.otherLabel || 'Other');
    if (otherWrapper) {
        otherWrapper.hidden = !otherSelected;
    }
    if (otherInput) {
        otherInput.required = otherSelected;
        if (!otherSelected) {
            otherInput.value = '';
        }
    }

}

document.addEventListener('DOMContentLoaded', updateTemplateItems);
</script>
{% endblock %}
