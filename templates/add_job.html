{% extends "base.html" %}

{% block title %}Add Lead | KAS{% endblock %}

{% block content %}
<section class="form-shell">
    <div class="page-title compact">
        <div>
            <p class="eyebrow">Pipeline Intake</p>
            <h1>Add Lead</h1>
            <p>Create a sales pipeline record before it becomes a scheduled job.</p>
        </div>
    </div>

    <form class="form-card" method="post" action="{{ url_for('add_job') }}">
        <label for="name">Job Name</label>
        <input id="name" name="name" type="text" value="{{ name or '' }}" required maxlength="120" autocomplete="off">

        <label for="client_name">Client Name</label>
        <input id="client_name" name="client_name" type="text" value="{{ client_name or '' }}" required maxlength="140" autocomplete="name">

        <label for="location">Location</label>
        <input id="location" name="location" type="text" value="{{ location or '' }}" required maxlength="180" autocomplete="street-address">

        <label for="status">Starting Stage</label>
        <select id="status" name="status" required>
            {% for pipeline_status in statuses %}
                <option value="{{ pipeline_status }}" {% if (status or 'Lead') == pipeline_status %}selected{% endif %}>{{ pipeline_status }}</option>
            {% endfor %}
        </select>

        <div class="form-grid two">
            <div>
                <label for="proposal_amount">Proposal Amount</label>
                <input id="proposal_amount" name="proposal_amount" type="number" min="0" step="0.01" value="{{ proposal_amount or '' }}" placeholder="0.00">
            </div>
            <div>
                <label for="proposal_sent_date">Proposal Sent Date</label>
                <input id="proposal_sent_date" name="proposal_sent_date" type="date" value="{{ proposal_sent_date or '' }}">
            </div>
        </div>

        <div class="form-grid two">
            <div>
                <label for="assigned_to">Assign Employee</label>
                <select id="assigned_to" name="assigned_to">
                    <option value="">Unassigned</option>
                    {% for employee in employees %}
                        <option value="{{ employee.id }}" {% if assigned_to == employee.id %}selected{% endif %}>{{ employee.name }} ({{ employee.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label for="client_id">Client Portal User</label>
                <select id="client_id" name="client_id">
                    <option value="">No client access yet</option>
                    {% for client in clients %}
                        <option value="{{ client.id }}" {% if client_id == client.id %}selected{% endif %}>{{ client.name }} ({{ client.email }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="5" required>{{ description or '' }}</textarea>

        <div class="form-grid two">
            <button class="button button-primary button-full" type="submit">Create Lead</button>
            <a class="button button-full" href="{{ url_for('index') }}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
