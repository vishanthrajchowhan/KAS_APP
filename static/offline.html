<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KAS App Offline</title>
  <meta name="theme-color" content="#0f6a47">
  <style>
    :root {
      --bg: #0f1714;
      --surface: #13201b;
      --ink: #edf6f1;
      --muted: #b5c8bf;
      --accent: #1ba36f;
      --line: #264136;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: "Manrope", "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at top right, rgba(27, 163, 111, 0.2), transparent 45%), var(--bg);
      color: var(--ink);
    }

    .offline-card {
      width: min(460px, 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      padding: 28px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
    }

    .mark {
      margin: 0 auto 14px;
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #1ba36f, #0f6a47);
      color: #fff;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.45rem;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    button {
      margin-top: 18px;
      min-height: 46px;
      min-width: 160px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, #1ba36f, #0f6a47);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <section class="offline-card" aria-live="polite">
    <div class="mark">KAS</div>
    <h1>You're offline</h1>
    <p>KAS App is still available for basic viewing. Reconnect to sync jobs, estimates, and updates.</p>
    <button type="button" onclick="location.reload()">Try Again</button>
  </section>
</body>
</html>
